# Site settings
title: YE Studio Tool Market
email: ""
description: >-
  Handcrafted Chrome extensions, Figma plugins, and focused utilities
  made by YE Studio.
baseurl: ""
url: "https://id-velop.github.io"
twitter_username: ""
github_username: id-velop

# Build settings
theme: jekyll-theme-minimal
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Legacy project collection
collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
