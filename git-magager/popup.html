<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Git Magager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="#8b5cf6" d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-2 .89-2 2v11c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/>
        </svg>
      </div>
      <h1>Git Magager</h1>
    </div>

    <div id="server-status" class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>

    <!-- Payment status bar -->
    <div id="payment-status" class="payment-bar">
      <div class="payment-info">
        <span id="payment-icon">🔒</span>
        <span id="payment-text">Free tier</span>
      </div>
      <button id="payment-btn" class="payment-btn">Upgrade</button>
    </div>

    <div id="clone-section" class="section">
      <label class="label">Clone URL</label>
      <div class="input-group">
        <input type="text" id="clone-url" placeholder="https://github.com/user/repo.git" />
      </div>

      <button id="clone-btn" class="clone-btn">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-2 .89-2 2v11c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/>
        </svg>
        Open Clone Page
      </button>
    </div>

    <div class="footer">
      <a href="#" id="options-link">How it works</a>
      <span class="version">v1.1.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
